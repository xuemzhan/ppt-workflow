name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: "Smoke test: orchestrate can find all skills"
        run: python scripts/orchestrate.py --list

      - name: Run end-to-end integration tests
        run: python -m pytest tests/test_e2e.py -v --tb=short

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_e2e.py

      - name: All tests with coverage
        run: python -m pytest tests/ --cov=skills --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests,e2e
          fail_ci_if_error: false

  lint:
    name: Lint (ruff + basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff basedpyright

      - name: Ruff (lint)
        run: ruff check skills/ scripts/ tests/

      - name: Basedpyright (type check)
        run: basedpyright skills/ scripts/ tests/

  # 端到端产物验证(可选,在 PR 时跑)
  smoke:
    name: Orchestrate end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run orchestrate (full pipeline)
        run: |
          python scripts/orchestrate.py \
            --input examples/sample_deck/input \
            --output /tmp/ppt-test-output \
            --force
      - name: Verify outputs
        run: |
          test -f /tmp/ppt-test-output/deck_final.pptx
          test -f /tmp/ppt-test-output/qa_report.md
          test -f /tmp/ppt-test-output/speaker_notes.md
          test -f /tmp/ppt-test-output/thumbnails.jpg
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deck-output
          path: /tmp/ppt-test-output/
          retention-days: 7
