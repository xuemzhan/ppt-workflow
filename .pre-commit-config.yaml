# Pre-commit hooks for ppt-workflow
# 安装:pip install pre-commit && pre-commit install
# 手动跑:pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: pytest
        name: Run tests (37 unit + e2e)
        entry: python -m pytest tests/ -v --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]  # 默认不跑,只在 pre-commit run --hook-stage manual 时跑

      - id: ruff-check
        name: ruff lint
        entry: ruff check skills/ scripts/ tests/
        language: system
        types: [python]
        stages: [commit]

      - id: ruff-format
        name: ruff format
        entry: ruff format --check skills/ scripts/ tests/
        language: system
        types: [python]
        stages: [commit]

      - id: basedpyright
        name: basedpyright type check
        entry: basedpyright skills/ scripts/ tests/
        language: system
        types: [python]
        pass_filenames: false
        stages: [manual]  # 类型检查太慢,只在 manual 阶段跑

      - id: no-large-files
        name: No large files (>500KB)
        entry: python -c "import sys; import os; [sys.exit(1) for f in sys.argv[1:] if os.path.getsize(f) > 500*1024]"
        language: system
        always_run: false
        stages: [commit]

      - id: no-pyc-check
        name: No __pycache__ committed
        entry: python -c "import sys, os; sys.exit(1) if any('__pycache__' in p or p.endswith('.pyc') for p in sys.argv[1:])"
        language: system
        pass_filenames: false
        stages: [commit]
